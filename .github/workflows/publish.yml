name: brew pr-pull

on:
  pull_request_target:
    types:
      - labeled

jobs:
  pr-pull:
    if: contains(github.event.pull_request.labels.*.name, 'pr-pull')
    runs-on: ubuntu-latest
    permissions:
      actions: read
      checks: read
      contents: write
      packages: write
      pull-requests: write
    steps:
      # Mint a short-lived token for the org-installed langchain-actions-pr-bot
      # App. Used only to push the bottle commit to main below: the bot is an
      # `always` bypass actor on the main ruleset, whereas GITHUB_TOKEN
      # (github-actions[bot]) is not and would be rejected.
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: "Iv23liMFOFBcPTKFWi3S"
          private-key: ${{ secrets.LANGCHAIN_ACTIONS_PR_BOT_PRIVATE_KEY }}
          repositories: homebrew-tap

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@df4b09108a1de9d6f995fe68f302b3f68bd6d2ef # main
        with:
          # Configure git auth with the app token so the push to main below is
          # attributed to langtions-bot (the ruleset bypass actor). git-try-push
          # inherits this auth; passing a token there too sends a second
          # Authorization header and GitHub 400s ("Duplicate header").
          token: ${{ steps.app-token.outputs.token }}

      - name: Set up git
        uses: Homebrew/actions/git-user-config@df4b09108a1de9d6f995fe68f302b3f68bd6d2ef # main

      # Uploads bottles to ghcr and commits the bottle block to main. NOTE: a
      # NEW formula's ghcr package is created private; an org owner must make it
      # public once before `brew install` can fetch its bottles. See the README
      # "Maintaining" section.
      - name: Pull bottles
        env:
          HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_GITHUB_PACKAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_GITHUB_PACKAGES_USER: ${{ github.repository_owner }}
          PULL_REQUEST: ${{ github.event.pull_request.number }}
        run: brew pr-pull --debug --tap="$GITHUB_REPOSITORY" "$PULL_REQUEST"

      - name: Push commits
        uses: Homebrew/actions/git-try-push@df4b09108a1de9d6f995fe68f302b3f68bd6d2ef # main
        with:
          branch: main

      - name: Delete branch
        if: github.event.pull_request.head.repo.fork == false
        env:
          BRANCH: ${{ github.event.pull_request.head.ref }}
        run: git push --delete origin "$BRANCH"
