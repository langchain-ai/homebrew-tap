name: bump formulae

on:
  schedule:
    - cron: "0 16 * * *" # daily at 16:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bump:
    runs-on: ubuntu-latest
    env:
      # The action re-taps langchain-ai/tap fresh; newer Homebrew refuses to
      # load formulae from an untrusted third-party tap. An ephemeral CI runner
      # can't persist `brew trust`, so disable the requirement for our own tap.
      HOMEBREW_NO_REQUIRE_TAP_TRUST: "1"
    steps:
      # Mint a short-lived token for the org-installed langchain-actions-pr-bot
      # App. A PR opened with GITHUB_TOKEN would not trigger the test-bot
      # workflow; an App-authored PR does, so the bottle CI runs on the bump.
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: "Iv23liMFOFBcPTKFWi3S"
          private-key: ${{ secrets.LANGCHAIN_ACTIONS_PR_BOT_PRIVATE_KEY }}
          repositories: homebrew-tap

      # Detects new upstream releases via `brew livecheck` and opens a PR
      # updating the formula's url + sha256.
      - name: Open bump PRs for outdated formulae
        uses: dawidd6/action-homebrew-bump-formula@1446dca236b0440c6f02723a3f14f13be2c04ab0 # v7
        with:
          token: ${{ steps.app-token.outputs.token }}
          # Commit identity for langtions-bot[bot]. Set explicitly so the action
          # skips its GitHub `/user` API call, which app/installation tokens
          # are forbidden from making (it 403s otherwise).
          user_name: "langtions-bot[bot]"
          user_email: "261626216+langtions-bot[bot]@users.noreply.github.com"
          # Push the bump branch directly to the tap rather than forking: the
          # app bot has write access and cannot own a personal fork.
          no_fork: true
          tap: langchain-ai/homebrew-tap
          formula: langsmith-cli
          livecheck: true
